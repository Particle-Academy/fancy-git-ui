name: Publish
on:
  push:
    tags: ["v*.*.*"]
permissions:
  contents: read
  id-token: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, registry-url: "https://registry.npmjs.org", cache: npm }
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
      # Trusted Publishing (OIDC) — authentication comes from GitHub Actions.
      # Pin npm 11.18.0 because npm 12.0.0 has a broken provenance path.
      - run: npx -y npm@11.18.0 publish --provenance --access public
